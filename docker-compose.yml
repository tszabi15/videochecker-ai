version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: videochecker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: videochecker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: videochecker-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videochecker-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - tmp_uploads:/tmp/videochecker
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/videochecker
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videochecker-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info -c 2
    volumes:
      - ./backend:/app
      - tmp_uploads:/tmp/videochecker
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/videochecker
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: videochecker-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  tmp_uploads:
